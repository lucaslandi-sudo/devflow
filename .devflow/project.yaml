# DevFlow Project Metadata
# Este arquivo contém informação estruturada sobre o estado do projeto
# Atualizado automaticamente pelo @chronicler

project:
  name: "DevFlow"
  version: "1.2.2"
  description: "Sistema multi-agentes para desenvolvimento de software"
  created: "2025-11-15"
  last_updated: "2026-03-24"

  # Estado atual
  status: "active"
  phase: "stable-community"

  # Repositório
  repository:
    url: "https://github.com/evolve-labs-cloud/devflow"
    main_branch: "main"

# Agentes disponíveis
agents:
  - id: "strategist"
    name: "Strategist"
    role: "planning"
    focus: "Planejamento & Produto"
    triggers:
      - "@strategist"
      - "PRD"
      - "requirements"
      - "user stories"
    outputs:
      - "docs/planning/"
      - "PRDs"
      - "User stories"

  - id: "architect"
    name: "Architect"
    role: "design"
    focus: "Design & Arquitetura"
    triggers:
      - "@architect"
      - "ADR"
      - "design"
      - "architecture"
    outputs:
      - "docs/decisions/"
      - "docs/architecture/"
      - "ADRs"
      - "Diagramas técnicos"

  - id: "system-designer"
    name: "System Designer"
    role: "system-design"
    focus: "System Design, Escalabilidade & Confiabilidade"
    triggers:
      - "@system-designer"
      - "system design"
      - "SDD"
      - "RFC"
      - "capacity planning"
      - "scalability"
      - "SLA"
      - "infrastructure"
      - "sharding"
      - "reliability"
    outputs:
      - "docs/system-design/"
      - "SDDs"
      - "RFCs"
      - "Capacity Plans"
      - "Trade-off Analysis"

  - id: "builder"
    name: "Builder"
    role: "implementation"
    focus: "Implementação"
    triggers:
      - "@builder"
      - "implement"
      - "code"
      - "refactor"
    outputs:
      - "Código fonte"
      - "Testes"
      - "Code reviews"

  - id: "guardian"
    name: "Guardian"
    role: "quality"
    focus: "Qualidade & Segurança"
    triggers:
      - "@guardian"
      - "test"
      - "security"
      - "performance"
    outputs:
      - "Estratégia de testes"
      - "Security audits"
      - "Performance reports"

  - id: "chronicler"
    name: "Chronicler"
    role: "documentation"
    focus: "Documentação & Memória"
    triggers:
      - "@chronicler"
      - "document"
      - "snapshot"
      - "changelog"
    outputs:
      - "docs/CHANGELOG.md"
      - ".devflow/snapshots/"
      - "ADRs automáticos"
      - "Knowledge graph"

# Tecnologias e stack
tech_stack:
  core:
    - "Markdown"
    - "YAML"
    - "JSON"
    - "Bash"

  tools:
    - "Claude Code"
    - "Git"

# Estrutura do projeto
structure:
  source_dirs:
    - ".devflow/"
    - "docs/"

  documentation_dirs:
    - "docs/decisions/"
    - "docs/architecture/"
    - "docs/planning/"
    - "docs/api/"
    - "docs/migration/"
    - "docs/system-design/"

  output_dirs:
    - ".devflow/snapshots/"

# Features implementadas
features:
  - id: "multi-agent-system"
    name: "Sistema Multi-Agentes"
    status: "implemented"
    version: "0.1.0"
    description: "6 agentes especializados para desenvolvimento"

  - id: "documentation-automation"
    name: "Documentação Automática"
    status: "implemented"
    version: "0.1.0"
    description: "Chronicler mantém CHANGELOG e snapshots"

  - id: "context-snapshots"
    name: "Context Snapshots"
    status: "implemented"
    version: "0.1.0"
    description: "Prevenção de drift através de snapshots"

  - id: "structured-metadata"
    name: "Metadata Estruturada"
    status: "implemented"
    version: "0.2.0"
    description: "YAML/JSON para parse rápido pela IA"

  - id: "hard-stops"
    name: "Hard Stops & Role Enforcement"
    status: "implemented"
    version: "0.3.0"
    description: "Regras explícitas que impedem agentes de fazer trabalho de outros"

  - id: "mandatory-delegation"
    name: "Delegação Obrigatória"
    status: "implemented"
    version: "0.3.0"
    description: "Fluxo mandatório de delegação entre agentes"

  - id: "auto-story-generation"
    name: "Geração Automática de Stories"
    status: "implemented"
    version: "0.3.0"
    description: "Chronicler gera stories se strategist não criar"

  - id: "system-designer-agent"
    name: "System Designer Agent"
    status: "implemented"
    version: "0.6.0"
    description: "6th agent specializing in system design at scale (DDIA, SRE)"

  - id: "challenger-agent"
    name: "Challenger Agent"
    status: "implemented"
    version: "1.2.0"
    description: "7th agent — adversarial review with OpenAI o3 after Guardian; available as standalone (devflow challenge) or via --challenger flag in autopilot"

  - id: "persistent-memory"
    name: "Persistent Memory"
    status: "implemented"
    version: "1.2.0"
    description: "Each autopilot execution recorded in .devflow/memory.json — sessions, technical decisions, per-agent artifacts. Zero context drift across sessions."

  - id: "adaptive-autopilot"
    name: "Adaptive Autopilot"
    status: "implemented"
    version: "1.2.0"
    description: "LLM classifies spec complexity (TRIVIAL/SIMPLE/MODERATE/COMPLEX) and decides which phases to run. Shows plan and asks for confirmation. --adaptive flag."

  - id: "context-isolation"
    name: "Context Isolation"
    status: "implemented"
    version: "1.2.0"
    description: "Each agent receives only the output of the previous agent (N-1 scoped context), reducing ~87% tokens. --full-context restores full pipeline context."

  - id: "dual-scaling-modes"
    name: "Dual Scaling Modes per Agent"
    status: "implemented"
    version: "1.1.1"
    description: "Each agent supports Parallel Subagents (Agent tool, default) and Claude Agent Teams (peer-to-peer, 'team' argument). Backward compatible."
    trigger: "/agents:<name> team <task>"

  - id: "agent-teams-default"
    name: "Agent Teams Enabled by Default"
    status: "implemented"
    version: "1.2.2"
    description: "devflow init and devflow update write CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 to .claude/settings.json automatically, activating team mode for all 7 agents without manual setup."

# Decisões arquiteturais (resumo - detalhes em ADRs)
decisions:
  - id: "ADR-001"
    title: "6 Agentes especializados ao invés de 19+ (inicialmente 5, expandido para 6 em v0.7.0)"
    status: "accepted"
    date: "2025-11-15"
    tags: ["architecture", "agents", "simplicity"]

  - id: "ADR-002"
    title: "Documentação centralizada em docs/"
    status: "accepted"
    date: "2025-11-15"
    tags: ["structure", "documentation"]

  - id: "ADR-003"
    title: "Metadata estruturada (YAML/JSON)"
    status: "accepted"
    date: "2025-11-15"
    tags: ["metadata", "ai-optimization"]

# Métricas (atualizadas pelo Chronicler)
metrics:
  total_agents: 7
  total_features: 15
  total_decisions: 3
  npm_package: "@evolve.labs/devflow"
  npm_version: "1.2.2"
  documentation_coverage: "excellent"
  metadata_coverage: "excellent"
  orchestration_coverage: "complete"
  last_snapshot: "2026-03-24"

# Configurações
config:
  chronicler:
    auto_snapshot: false
    snapshot_frequency: "on-demand"
    auto_changelog: true

  documentation:
    format: "markdown"
    adr_template: "docs/decisions/000-template.md"

  quality:
    require_tests: true
    require_security_review: true
    require_documentation: true
